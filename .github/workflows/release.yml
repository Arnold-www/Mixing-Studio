name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  QT_VERSION: 6.8.3
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            artifact: linux-x86_64
          - name: Windows
            os: windows-2022
            artifact: windows-x86_64
          - name: macOS
            os: macos-14
            artifact: macos-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtmultimedia
          cache: true
          install-deps: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          MIXING_STUDIO_FORCE_TIMER_CLOCK: "1"
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install and archive
        id: archive
        shell: bash
        run: |
          stage_dir="stage"
          if [[ "$RUNNER_OS" != "macOS" ]]; then
            stage_dir="$GITHUB_WORKSPACE/stage"
          fi
          cmake --install build --config Release --prefix "$stage_dir"
          archive="Mixing-Studio-${GITHUB_REF_NAME}-${{ matrix.artifact }}.tar.gz"
          cmake -E tar czf "$archive" --format=gnutar stage
          echo "path=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.artifact }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/*.tar.gz --generate-notes --verify-tag
